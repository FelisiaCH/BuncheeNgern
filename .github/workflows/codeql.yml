# CodeQL code scanning (advanced setup).
# Committed workflow — requires GitHub's "default" CodeQL setup to be DISABLED
# (Settings → Code security → Code scanning), otherwise the two conflict.
#
# This repo is a no-build, single-file vanilla-JS PWA: index.html inline
# <script> blocks, service-worker.js, i18n/*.js, and Code.gs (Apps Script,
# JavaScript syntax) — all covered by the javascript-typescript analysis.
name: "CodeQL"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan (Mondays 06:17 UTC) so issues surface even without new commits.
    - cron: "17 6 * * 1"

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest

    # Least-privilege token: write scan results, read code/actions metadata.
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Initialize CodeQL. build-mode "none": JavaScript/TypeScript is
      # interpreted, so there is nothing to compile.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          build-mode: none
          # No "queries:" key → CodeQL runs its DEFAULT query suite (kept simple
          # for a small project). For broader, noisier coverage you could add:
          #   queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"
